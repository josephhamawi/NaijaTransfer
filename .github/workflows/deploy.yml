# ─────────────────────────────────────────────────────────
# NigeriaTransfer — CI/CD Pipeline
# Triggers on push to main branch or manual dispatch.
# Runs lint, type check, tests, builds, and deploys to production VM.
# ─────────────────────────────────────────────────────────

name: Deploy

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy public keys for CI build (prerendering needs them to not crash)
  NEXT_PUBLIC_FIREBASE_API_KEY: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "naijatransfer"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "ci-placeholder"
  NEXT_PUBLIC_FIREBASE_APP_ID: "ci-placeholder"
  NEXT_PUBLIC_APP_URL: "https://nigeriatransfer.com"

jobs:
  # ─── Quality checks ─────────────────────────────────
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

  # ─── Build ──────────────────────────────────────────
  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

  # ─── Deploy to Production VM ────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 2h command timeout to match Caddy/pm2 upload windows — a rolling
          # reload can legitimately wait that long for an in-flight upload.
          command_timeout: 120m
          script: |
            set -euo pipefail
            cd /home/naija/NaijaTransfer
            # Pull first so that scripts/deploy.sh itself (and any of its
            # changes) are on disk before we invoke it. deploy.sh re-pulls
            # inside — that's a safe no-op now.
            git fetch --all --prune
            git reset --hard origin/main
            # scripts/deploy.sh handles: build with BUILD_ID for skew
            # protection, preserving previous chunks, Caddy reload if
            # config changed, and a rolling `pm2 reload` that doesn't
            # kill in-flight uploads.
            bash scripts/deploy.sh

      - name: Notify deployment success
        if: success()
        run: echo "Deployment to production completed successfully"

      - name: Notify deployment failure
        if: failure()
        run: echo "Deployment FAILED - check logs for details"
