# ─────────────────────────────────────────────────────────
# NigeriaTransfer — CI/CD Pipeline
# Triggers on push to main branch.
# Runs lint, type check, tests, builds, and deploys to Oracle ARM VM.
# ─────────────────────────────────────────────────────────

name: Deploy

on:
  workflow_dispatch:  # Manual trigger only until SSH deploy keys are configured
  # push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Quality checks ─────────────────────────────────
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Run tests
        run: npm run test:run

  # ─── Build ──────────────────────────────────────────
  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

  # ─── Deploy to Oracle ARM VM ────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            cd /opt/nigeriatransfer

            # Pull latest code
            git pull origin main

            # Install production dependencies
            npm ci --production

            # Generate Prisma client
            npx prisma generate

            # Run database migrations
            npx prisma migrate deploy

            # Build Next.js
            npm run build

            # Restart PM2 processes
            pm2 restart nigeriatransfer

            # Wait for startup
            sleep 5

            # Health check
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
            if [ "$HTTP_STATUS" -ne 200 ]; then
              echo "Health check failed with status $HTTP_STATUS"
              pm2 logs nigeriatransfer --lines 50
              exit 1
            fi

            echo "Deployment successful! Health check returned $HTTP_STATUS"

      - name: Notify deployment success
        if: success()
        run: echo "Deployment to Oracle ARM VM completed successfully"

      - name: Notify deployment failure
        if: failure()
        run: echo "Deployment FAILED - check logs for details"
