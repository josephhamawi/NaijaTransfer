# ─────────────────────────────────────────────────────────
# NigeriaTransfer — Local Development Docker Compose
# Provides PostgreSQL and MinIO (S3-compatible for R2 testing)
# ─────────────────────────────────────────────────────────

services:
  # PostgreSQL 16 — matches production
  postgres:
    image: postgres:16-alpine
    container_name: nigeriatransfer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nigeriatransfer
      POSTGRES_PASSWORD: nigeriatransfer
      POSTGRES_DB: nigeriatransfer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nigeriatransfer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO — S3-compatible local storage (simulates Cloudflare R2)
  minio:
    image: minio/minio:latest
    container_name: nigeriatransfer-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: nigeriatransfer-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/nigeriatransfer-files;
        mc mb --ignore-existing local/nigeriatransfer-backups;
        echo 'Buckets created successfully';
      "

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
